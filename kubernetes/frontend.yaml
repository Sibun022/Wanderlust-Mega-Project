apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: wanderlust
  labels:
    app: frontend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend

          image: biswa022/wanderlust-frontend-beta:v2.2

          ports:
            - containerPort: 5173

          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 5173
            initialDelaySeconds: 30
            periodSeconds: 10


---
apiVersion: v1
kind: Service

metadata:
  name: frontend-service
  namespace: wanderlust

spec:
  type: NodePort

  selector:
    app: frontend

  ports:
    - port: 5173
      targetPort: 5173
      protocol: TCP
      nodePort: 31000